services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flyntos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.example
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env.example
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file:
      - .env.example
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:

